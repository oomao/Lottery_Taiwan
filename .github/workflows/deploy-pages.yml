name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # 在資料/模型更新 workflow 完成後也觸發部署
  # (因為它們用 GITHUB_TOKEN 做的 push 不會觸發 push 事件,需要明確的 workflow_run)
  workflow_run:
    workflows: ['Update Lottery Data', 'Train ML Model']
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # workflow_run 觸發時,只在來源 workflow 成功才部署
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
