name: Train ML Model

# 純手動觸發 (訓練成本高,不排程)
on:
  workflow_dispatch:
    inputs:
      game:
        description: '訓練哪個彩種 (目前僅 539)'
        required: false
        default: '539'
        type: choice
        options:
          - '539'
      models:
        description: '訓練哪些模型'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - lstm
          - xgboost
      epochs:
        description: 'LSTM epoch 數 (預設 100,EarlyStopping 會自動停)'
        required: false
        default: '100'
        type: string
      batch:
        description: 'LSTM batch size'
        required: false
        default: '32'
        type: string

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 60
    env:
      GAME: ${{ github.event.inputs.game || '539' }}
      MODELS: ${{ github.event.inputs.models || 'both' }}
      EPOCHS: ${{ github.event.inputs.epochs || '100' }}
      BATCH: ${{ github.event.inputs.batch || '32' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/ml/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/ml/requirements.txt

      - name: Train LSTM model
        if: env.MODELS == 'both' || env.MODELS == 'lstm'
        run: python scripts/ml/train_lstm.py "$GAME" --epochs "$EPOCHS" --batch "$BATCH"

      - name: Convert LSTM to TF.js
        if: env.MODELS == 'both' || env.MODELS == 'lstm'
        run: python scripts/ml/convert_to_tfjs.py "$GAME"

      - name: Train XGBoost model
        if: env.MODELS == 'both' || env.MODELS == 'xgboost'
        run: python scripts/ml/train_xgboost.py "$GAME"

      - name: Show output files
        run: |
          ls -lh public/models/"$GAME"/
          if [ -f public/models/"$GAME"/metadata.json ]; then
            echo "--- LSTM metadata (excerpt) ---"
            head -c 1000 public/models/"$GAME"/metadata.json
          fi
          if [ -f public/models/"$GAME"/xgboost-metadata.json ]; then
            echo ""
            echo "--- XGBoost metadata (excerpt) ---"
            head -c 1000 public/models/"$GAME"/xgboost-metadata.json
          fi

      - name: Commit model files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/models/"$GAME"
          if git diff --staged --quiet; then
            echo "No model changes to commit"
          else
            git commit -m "chore: train $GAME model(s) - $MODELS ($(date -u +%Y-%m-%d))"
            git push
          fi
