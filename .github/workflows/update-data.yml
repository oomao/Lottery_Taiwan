name: Update Lottery Data

on:
  schedule:
    # 台灣時間 21:30 (UTC 13:30) 每天跑一次
    # 539 開獎時間 20:30,留 1 小時讓官方 API 更新
    - cron: '30 13 * * *'
  workflow_dispatch:
    inputs:
      months_back:
        description: '回填幾個月歷史 (1–36,首次建議填 36 抓滿 3 年)'
        required: false
        default: '12'
        type: string
      game:
        description: '要更新的彩種'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - '539'
          - lotto649
          - superlotto

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      MONTHS_BACK: ${{ github.event.inputs.months_back || '12' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Run update (with retry)
        run: |
          for i in 1 2 3; do
            if npm run update:all; then
              exit 0
            fi
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
          done
          exit 1

      # Heartbeat:即使資料沒變也寫入時間戳,確保每次都有 commit,
      # 避開 GitHub Actions「公開 repo 60 天無活動就停用排程」的限制
      - name: Write heartbeat
        run: |
          mkdir -p .github
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last-run.txt

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data .github/last-run.txt
          if git diff --staged --quiet; then
            echo "No changes (shouldn't happen because of heartbeat)"
          else
            git commit -m "chore: update lottery data ($(date -u +%Y-%m-%d))"
            git push
          fi
